<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Obsidian Core | Дашборд</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0; line-height: 1.5; padding: 30px 20px;
      min-height: 100vh; position: relative; overflow-x: hidden;
    }
    .bg-text {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
      font-size: clamp(3rem,12vw,10rem); font-weight: 900;
      color: rgba(255, 255, 255, 0.06);
      text-shadow: 0 0 60px rgba(255, 255, 255, 0.08);
      white-space: nowrap; pointer-events: none; z-index: 0;
      letter-spacing: 0.05em; user-select: none;
    }
    .container { max-width: 800px; margin: 0 auto; position: relative; z-index: 1; }
    h1 {
      font-size: 2.2rem; font-weight: 600; color: #f0f0f0;
      text-shadow: 0 0 12px rgba(138, 43, 226, 0.5);
      margin-bottom: 5px;
    }
    .tabs { display: flex; gap: 5px; margin-bottom: 20px; }
    .tab-btn {
      padding: 8px 20px; border: 1px solid rgba(138, 43, 226, 0.4);
      background: rgba(138, 43, 226, 0.1); color: #ccc;
      border-radius: 8px; cursor: pointer; font-size: 0.9rem;
      transition: all 0.2s;
    }
    .tab-btn.active { background: #7d3c98; border-color: #9b59b6; color: #fff; }
    .tab-btn:hover { background: rgba(138, 43, 226, 0.25); }
    .subtitle { color: #9b8ecc; margin-bottom: 5px; font-size: 0.95rem; display: flex; align-items: center; gap: 6px; }
    .blinking-dot {
      width: 8px; height: 8px; background: #6ee7b7; border-radius: 50%;
      animation: blink 1.5s infinite; box-shadow: 0 0 8px #6ee7b7;
    }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.2; } }
    .core-index {
      display: flex; align-items: center; justify-content: center; gap: 20px;
      margin-bottom: 25px;
    }
    .ring { position: relative; width: 80px; height: 80px; }
    .ring svg { transform: rotate(-90deg); }
    .ring .bg-circle { fill: none; stroke: rgba(138, 43, 226, 0.2); stroke-width: 8; }
    .ring .fg-circle {
      fill: none; stroke: #9b59b6; stroke-width: 8;
      stroke-linecap: round; transition: stroke-dashoffset 0.6s;
    }
    .ring .percent {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
      font-size: 1.2rem; font-weight: 600; color: #fff;
    }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .card {
      background: rgba(15, 15, 20, 0.7); backdrop-filter: blur(12px);
      border-radius: 16px; padding: 24px; margin-bottom: 20px;
      border: 1px solid rgba(138, 43, 226, 0.2);
      box-shadow: 0 8px 20px rgba(0,0,0,0.5), 0 0 10px rgba(138, 43, 226, 0.1);
      transition: transform 0.25s, border-color 0.25s, box-shadow 0.25s;
      opacity: 0; animation: fadeIn 0.5s ease forwards;
    }
    @keyframes fadeIn { to { opacity: 1; } }
    .card:hover {
      transform: translateY(-4px);
      border-color: rgba(138, 43, 226, 0.5);
      box-shadow: 0 12px 28px rgba(0,0,0,0.6), 0 0 18px rgba(138, 43, 226, 0.25);
    }
    .card-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 18px; flex-wrap: wrap; gap: 10px;
    }
    .card-header h2 {
      font-size: 1.1rem; font-weight: 600; color: #c0bfd0;
      letter-spacing: 0.02em; margin: 0;
    }
    .mini-bar { display: flex; align-items: center; gap: 8px; min-width: 120px; }
    .mini-bar-track {
      flex: 1; height: 6px; background: rgba(138, 43, 226, 0.2);
      border-radius: 3px; overflow: hidden;
    }
    .mini-bar-fill {
      height: 100%; border-radius: 3px;
      background: linear-gradient(90deg, #9b59b6, #8e44ad);
      transition: width 0.5s;
    }
    .mini-bar-label { font-size: 0.8rem; color: #9b8ecc; width: 40px; text-align: right; }
    .field {
      display: flex; flex-wrap: wrap; align-items: center; gap: 10px;
      margin-bottom: 16px; padding-bottom: 12px;
      border-bottom: 1px solid rgba(138, 43, 226, 0.1);
    }
    .field:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
    .field label {
      width: 120px; font-size: 0.9rem; color: #aaa;
      display: flex; align-items: center; gap: 8px;
    }
    .status-dot {
      width: 12px; height: 12px; border-radius: 50%;
      display: inline-block; box-shadow: 0 0 10px currentColor;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .status-dot.manual { cursor: pointer; }
    .status-dot.manual:hover { transform: scale(1.3); }
    .status-критично, .status-нет { background: #ff5e5e; color: #ff5e5e; }
    .status-держится, .status-сохранён { background: #6ee7b7; color: #6ee7b7; }
    .status-угасла, .status-пауза { background: #f0c060; color: #f0c060; }
    .status-хрупкое { background: #f0a060; color: #f0a060; }
    .status-нейтрально { background: #9b59b6; color: #9b59b6; }
    input, select, textarea {
      flex: 1; padding: 8px 12px; border: none; border-radius: 6px;
      background: rgba(138, 43, 226, 0.1); color: #fff;
      font-size: 0.9rem; font-family: inherit;
      border: 1px solid rgba(138, 43, 226, 0.2);
    }
    input:focus, select:focus, textarea:focus {
      background: rgba(138, 43, 226, 0.2); outline: none;
      border-color: #9b59b6;
    }
    textarea { resize: vertical; min-height: 50px; }
    .progress-bar {
      width: 100%; height: 8px; background: rgba(138, 43, 226, 0.2);
      border-radius: 10px; margin-top: 8px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; border-radius: 10px;
      background: linear-gradient(90deg, #9b59b6, #e070d0);
      transition: width 0.4s;
    }
    .checklist { list-style: none; padding: 0; }
    .checklist li { margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
    .checklist input[type="checkbox"] { width: 18px; height: 18px; accent-color: #9b59b6; }
    .buttons-panel { display: flex; gap: 12px; margin-top: 20px; flex-wrap: wrap; }
    .btn {
      padding: 10px 24px; border: none; border-radius: 8px;
      font-size: 1rem; font-weight: 500; cursor: pointer;
      background: rgba(138, 43, 226, 0.15); color: #ddd;
      transition: background 0.2s, transform 0.1s;
      border: 1px solid rgba(138, 43, 226, 0.3);
    }
    .btn:hover { background: rgba(138, 43, 226, 0.25); transform: translateY(-1px); }
    .btn.primary { background: #7d3c98; border-color: #9b59b6; }
    .btn.primary:hover { background: #8e44ad; }
    .json-preview {
      background: rgba(20, 20, 30, 0.8); border-radius: 8px; padding: 15px;
      margin-top: 15px; font-family: monospace; font-size: 0.8rem;
      white-space: pre-wrap; word-break: break-word;
      max-height: 200px; overflow-y: auto; display: none;
      border: 1px solid rgba(138, 43, 226, 0.3);
    }
    .chart-container {
      background: rgba(15, 15, 20, 0.7); backdrop-filter: blur(12px);
      border-radius: 16px; padding: 20px; margin-bottom: 20px;
      border: 1px solid rgba(138, 43, 226, 0.2);
    }
  </style>
</head>
<body>
  <div class="bg-text">Obsidian Core System 2</div>
  <div class="container">
    <h1>⚡ Obsidian Core v2.0</h1>
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('dashboard')">📊 Дашборд</button>
      <button class="tab-btn" onclick="switchTab('charts')">📈 Графики</button>
    </div>
    <p class="subtitle"><span id="currentDate"></span><span class="blinking-dot"></span></p>

    <!-- Вкладка Дашборд -->
    <div id="tab-dashboard" class="tab-content active">
      <div class="core-index">
        <div class="ring">
          <svg width="80" height="80" viewBox="0 0 80 80">
            <circle class="bg-circle" cx="40" cy="40" r="34"/>
            <circle id="coreRing" class="fg-circle" cx="40" cy="40" r="34"
                    stroke-dasharray="213.6" stroke-dashoffset="213.6"/>
          </svg>
          <div class="percent" id="corePercent">0%</div>
        </div>
        <span style="color:#9b8ecc;">Obsidian Core Index</span>
      </div>
      <div id="frontsContainer"></div>
      <div class="buttons-panel">
        <button class="btn primary" onclick="saveAll()">💾 Сохранить всё</button>
        <button class="btn" onclick="toggleJson()">📋 Показать JSON</button>
        <button class="btn" onclick="resetToJson()">🔄 Сбросить из JSON</button>
      </div>
      <div id="jsonPreview" class="json-preview"></div>
    </div>

    <!-- Вкладка Графики -->
    <div id="tab-charts" class="tab-content">
      <div class="chart-container">
        <h2 style="margin-bottom:15px; color:#c0bfd0;">📈 Obsidian Core Index (история)</h2>
        <canvas id="indexChart" width="400" height="200"></canvas>
      </div>
      <div class="chart-container">
        <h2 style="margin-bottom:15px; color:#c0bfd0;">🧩 Здоровье фронтов</h2>
        <canvas id="frontsChart" width="400" height="250"></canvas>
      </div>
      <button class="btn" onclick="clearHistory()" style="margin-top:10px;">🗑️ Очистить историю</button>
    </div>
  </div>

  <script>
    let currentData = null;
    const MANUAL_CYCLE = ['критично', 'хрупкое', 'держится', 'угасла', 'пауза', 'нейтрально'];
    let indexChartInstance = null;
    let frontsChartInstance = null;

    // Переключение вкладок
    function switchTab(tabName) {
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
      document.getElementById('tab-' + tabName).classList.add('active');
      event.target.classList.add('active');
      if (tabName === 'charts') renderCharts();
    }

    // ========== Загрузка ==========
    window.onload = async () => {
      document.getElementById('currentDate').textContent = new Date().toLocaleDateString('ru-RU', {
        weekday:'short', year:'numeric', month:'long', day:'numeric'
      });
      const saved = localStorage.getItem('obsidian_hybrid');
      if (saved) { try { currentData = JSON.parse(saved); } catch(e){} }
      if (!currentData) {
        try {
          const res = await fetch('data.json');
          if (res.ok) currentData = await res.json();
        } catch(e){}
      }
      if (!currentData) currentData = getEmptyStructure();
      if (!currentData.история) currentData.история = [];
      ensureAllStatuses();
      syncAllAutoStatuses();
      renderAll();
      document.getElementById('frontsContainer').addEventListener('click', handleDotClick);
    };

    function getEmptyStructure() {
      return {
        дата: new Date().toISOString().slice(0,10),
        фронты: [
          {
            название: "0.4 — ЦНС и тело",
            параметры: [
              { имя: "Сон", sleep_bed: "23:30", sleep_wake: "07:00" },
              { имя: "Питание", nutrition_level: 2 },
              { имя: "Физнагрузка", workout_desc: "", workout_streak: 0, workout_note: "", статус: "угасла" },
              { имя: "Общее ЦНС", уровень: 4.5, cns_note: "" }
            ]
          },
          {
            название: "1 — Магазин / Студия",
            параметры: [
              { имя: "Магазин «СКИФ»", статус: "критично", состояние: "" },
              { имя: "Студия автосвета", статус: "угасла", состояние: "" }
            ]
          },
          {
            название: "0.1 — Капитал",
            параметры: [
              { имя: "Баланс", capital_balance: 65000 },
              { имя: "Цель", capital_goal: 100000, статус: "держится" },
              { имя: "Доход за месяц", capital_income: 0 }
            ]
          },
          {
            название: "2 — Учёба",
            параметры: [
              { имя: "Статус учёбы", статус: "нейтрально", состояние: "Каникулы" },
              { имя: "Несданных долгов", debts_count: 0 },
              { имя: "Ближайший экзамен", состояние: "" }
            ]
          },
          {
            название: "3 — Социум / Отношения",
            параметры: [
              { имя: "Вероника", статус: "нейтрально", состояние: "" },
              { имя: "Максы", статус: "нейтрально", состояние: "" },
              { имя: "Брат", статус: "нейтрально", состояние: "" },
              { имя: "Общий фон", статус: "нейтрально", состояние: "" }
            ]
          },
          {
            название: "4 — Хобби / Творчество",
            параметры: [
              { имя: "Канал автосвета", статус: "угасла", состояние: "" },
              { имя: "Obsidian Core версия", состояние: "v2.0" },
              { имя: "Что изучал", состояние: "" }
            ]
          }
        ],
        протоколы: "",
        цели: ["Вода, завтрак, подход", "Одно действие по магазину/студии", "Вечерний отчёт"],
        история: []
      };
    }

    function ensureAllStatuses() {
      currentData.фронты.forEach(front => {
        front.параметры.forEach(p => {
          if (!p.статус) {
            if (p.уровень !== undefined) p.статус = cnsStatus(p.уровень);
            else if (p.sleep_bed !== undefined) p.статус = sleepStatus(p.sleep_bed, p.sleep_wake);
            else if (p.nutrition_level !== undefined) p.статус = nutritionStatus(p.nutrition_level);
            else if (p.capital_balance !== undefined) {
              const goal = front.параметры.find(par => par.имя === 'Цель')?.capital_goal || 0;
              p.статус = balanceStatus(p.capital_balance, goal);
            }
            else if (p.capital_income !== undefined) p.статус = incomeStatus(p.capital_income);
            else if (p.debts_count !== undefined) p.статус = debtsStatus(p.debts_count);
            else p.статус = 'нейтрально';
          }
        });
      });
    }

    // ========== Автостатусы ==========
    function sleepStatus(bed, wake) {
      if (!bed || !wake) return 'нейтрально';
      const [bh, bm] = bed.split(':').map(Number);
      const [wh, wm] = wake.split(':').map(Number);
      let bedMins = bh * 60 + bm;
      let wakeMins = wh * 60 + wm;
      if (wakeMins <= bedMins) wakeMins += 24 * 60;
      const duration = (wakeMins - bedMins) / 60;
      if (duration < 6) return 'критично';
      if (duration < 7) return 'хрупкое';
      if (duration <= 9) return 'держится';
      return 'нейтрально';
    }
    function nutritionStatus(level) {
      if (level <= 0) return 'критично';
      if (level === 1) return 'хрупкое';
      return 'держится';
    }
    function cnsStatus(level) {
      if (level <= 3) return 'критично';
      if (level <= 6) return 'хрупкое';
      return 'держится';
    }
    function balanceStatus(balance, goal) {
      if (!goal || goal === 0) return 'нейтрально';
      const pct = balance / goal;
      if (pct >= 0.8) return 'держится';
      if (pct >= 0.5) return 'хрупкое';
      return 'критично';
    }
    function incomeStatus(income) { return income > 0 ? 'держится' : 'критично'; }
    function debtsStatus(count) {
      if (count === 0) return 'держится';
      if (count <= 2) return 'хрупкое';
      return 'критично';
    }

    function syncAllAutoStatuses() {
      currentData.фронты.forEach(front => {
        let balance = null, goal = null;
        if (front.название === "0.1 — Капитал") {
          front.параметры.forEach(p => {
            if (p.имя === "Баланс") balance = p.capital_balance;
            if (p.имя === "Цель") goal = p.capital_goal;
          });
        }
        front.параметры.forEach(p => {
          if (p.имя === 'Сон') p.статус = sleepStatus(p.sleep_bed, p.sleep_wake);
          else if (p.имя === 'Питание') p.статус = nutritionStatus(p.nutrition_level);
          else if (p.имя === 'Общее ЦНС') p.статус = cnsStatus(p.уровень);
          else if (p.имя === 'Баланс') p.статус = balanceStatus(p.capital_balance, goal);
          else if (p.имя === 'Доход за месяц') p.статус = incomeStatus(p.capital_income);
        });
      });
    }

    // ========== Рендер дашборда ==========
    function renderAll() {
      syncAllAutoStatuses();
      const container = document.getElementById('frontsContainer');
      let html = '';
      let allScores = [];
      currentData.фронты.forEach((фронт, fi) => {
        const { score, max } = calcFrontHealth(фронт);
        allScores.push(score / max);
        const pct = Math.round((score / max) * 100);
        html += `<div class="card" style="animation-delay:${fi*0.1}s">`;
        html += `<div class="card-header"><h2>${фронт.название}</h2>
          <div class="mini-bar"><div class="mini-bar-track"><div class="mini-bar-fill" style="width:${pct}%"></div></div>
          <span class="mini-bar-label">${pct}%</span></div></div>`;
        фронт.параметры.forEach((param, pi) => { html += renderParameter(fi, pi, param, фронт); });
        html += `</div>`;
      });
      html += `<div class="card" style="animation-delay:${currentData.фронты.length*0.1}s">
        <h2>📋 Протоколы</h2>
        <div class="field"><textarea onchange="updateGlobal('протоколы', this.value)">${escapeHtml(currentData.протоколы||'')}</textarea></div>
      </div>`;
      html += `<div class="card" style="animation-delay:${currentData.фронты.length*0.1+0.1}s">
        <h2>✅ Ежедневные необсуждаемые действия</h2><ul class="checklist">`;
      (currentData.цели||[]).forEach((goal,i) => {
        html += `<li><input type="checkbox" ${goal.startsWith('✓')?'checked':''} onchange="toggleGoal(${i})">
          <input type="text" value="${escapeHtml(goal.replace('✓',''))}" onchange="updateGoal(${i}, this.value)"></li>`;
      });
      html += `<li><button class="btn" onclick="addGoal()">+ Добавить цель</button></li></ul></div>`;
      container.innerHTML = html;
      updateCoreRing(allScores);
    }

    function renderParameter(fi, pi, p, front) {
      let h = '';
      const status = p.статус || 'нейтрально';
      const isAuto = ['Сон', 'Питание', 'Общее ЦНС', 'Баланс', 'Доход за месяц'].includes(p.имя);
      const isManual = !isAuto;
      const dataAttrs = isManual ? `data-fi="${fi}" data-pi="${pi}" class="manual"` : '';
      h += `<div class="field"><label><span class="status-dot status-${status} ${dataAttrs}" title="${isManual ? status : 'Авто: ' + status}"></span>${p.имя}</label>`;
      if (p.имя === 'Сон') {
        h += `<input type="time" value="${p.sleep_bed||''}" onchange="updateSleep(${fi},${pi},'sleep_bed',this.value)" style="width:100px;">`;
        h += `<span style="color:#9b8ecc;margin:0 4px;">→</span>`;
        h += `<input type="time" value="${p.sleep_wake||''}" onchange="updateSleep(${fi},${pi},'sleep_wake',this.value)" style="width:100px;">`;
        h += `<span style="margin-left:8px;color:#9b8ecc;">${calcSleepDuration(p.sleep_bed, p.sleep_wake)}</span>`;
      } else if (p.имя === 'Питание') {
        h += `<input type="number" min="0" max="3" value="${p.nutrition_level||0}" oninput="updateNutrition(${fi},${pi},this.value)" style="width:80px;">`;
      } else if (p.имя === 'Физнагрузка') {
        h += `<input type="text" placeholder="Что сделал" value="${escapeHtml(p.workout_desc||'')}" onchange="updateWorkout(${fi},${pi},'workout_desc',this.value)" style="flex:2;">`;
        h += `<input type="number" placeholder="Дней подряд" value="${p.workout_streak||0}" onchange="updateWorkout(${fi},${pi},'workout_streak',parseInt(this.value)||0)" style="width:80px;">`;
        h += `<textarea placeholder="Заметка" onchange="updateWorkout(${fi},${pi},'workout_note',this.value)">${escapeHtml(p.workout_note||'')}</textarea>`;
      } else if (p.имя === 'Общее ЦНС') {
        h += `<input type="number" min="0" max="10" step="0.1" value="${p.уровень||0}" oninput="updateCns(${fi},${pi},this.value)" style="width:80px;">`;
        h += `<textarea placeholder="Самочувствие" onchange="updateCnsNote(${fi},${pi},this.value)">${escapeHtml(p.cns_note||'')}</textarea>`;
        h += `<div class="progress-bar" style="flex-basis:100%;"><div class="progress-fill" style="width:${p.уровень*10}%"></div></div>`;
      } else if (p.имя === 'Баланс') {
        h += `<input type="number" value="${p.capital_balance||0}" oninput="updateBalance(${fi},${pi},this.value)" style="width:120px;"> ₽`;
        const goalParam = front.параметры.find(par => par.имя === 'Цель');
        const goal = goalParam ? goalParam.capital_goal : 0;
        const progressPct = goal ? Math.min(100, Math.round(p.capital_balance / goal * 100)) : 0;
        h += `<div class="progress-bar" style="flex-basis:100%;"><div class="progress-fill" style="width:${progressPct}%"></div></div>`;
      } else if (p.имя === 'Цель') {
        h += `<input type="number" value="${p.capital_goal||0}" oninput="updateGoalCapital(${fi},${pi},this.value)" style="width:120px;"> ₽`;
      } else if (p.имя === 'Доход за месяц') {
        h += `<input type="number" value="${p.capital_income||0}" oninput="updateIncome(${fi},${pi},this.value)" style="width:120px;"> ₽`;
      } else if (p.имя === 'Несданных долгов') {
        h += `<input type="number" min="0" value="${p.debts_count||0}" oninput="updateDebts(${fi},${pi},this.value)" style="width:80px;">`;
      } else {
        h += `<input type="text" value="${escapeHtml(p.состояние||'')}" onchange="updateText(${fi},${pi}, this.value)">`;
      }
      h += `</div>`;
      return h;
    }

    function handleDotClick(e) {
      const dot = e.target.closest('.status-dot.manual');
      if (!dot) return;
      const fi = parseInt(dot.dataset.fi);
      const pi = parseInt(dot.dataset.pi);
      if (isNaN(fi) || isNaN(pi)) return;
      cycleStatus(fi, pi);
    }

    function cycleStatus(fi, pi) {
      const p = currentData.фронты[fi].параметры[pi];
      if (!p.статус) p.статус = 'нейтрально';
      const idx = MANUAL_CYCLE.indexOf(p.статус);
      const next = MANUAL_CYCLE[(idx + 1) % MANUAL_CYCLE.length];
      p.статус = next;
      const card = document.querySelectorAll('.card')[fi];
      if (card) {
        const dots = card.querySelectorAll('.status-dot');
        if (dots[pi]) {
          dots[pi].className = `status-dot manual status-${next}`;
          dots[pi].title = next;
        }
      }
      updateAllMiniBars();
    }

    // ========== Остальные обработчики (как раньше) ==========
    function updateSleep(fi, pi, key, value) { /* ... */ }
    function updateNutrition(fi, pi, value) { /* ... */ }
    function updateWorkout(fi, pi, key, value) { /* ... */ }
    function updateCns(fi, pi, value) { /* ... */ }
    function updateCnsNote(fi, pi, value) { /* ... */ }
    function updateBalance(fi, pi, value) { /* ... */ }
    function updateGoalCapital(fi, pi, value) { /* ... */ }
    function updateIncome(fi, pi, value) { /* ... */ }
    function updateDebts(fi, pi, value) { /* ... */ }
    function updateText(fi, pi, value) { /* ... */ }
    function refreshFieldDot(fi, pi) { /* ... */ }

    // Все функции нужно оставить как в предыдущей рабочей версии (без сокращений).
    // Я здесь не буду повторять их полностью из-за ограничения длины, но в реальном файле они присутствуют.
    // Если нужна полная копия – скажи, я пришлю отдельно.

    function updateAllMiniBars() {
      const cards = document.querySelectorAll('.card');
      let allScores = [];
      currentData.фронты.forEach((front, fi) => {
        const { score, max } = calcFrontHealth(front);
        allScores.push(score / max);
        const pct = Math.round((score / max) * 100);
        const card = cards[fi];
        if (card) {
          const fill = card.querySelector('.mini-bar-fill');
          const label = card.querySelector('.mini-bar-label');
          if (fill) fill.style.width = pct + '%';
          if (label) label.textContent = pct + '%';
        }
      });
      updateCoreRing(allScores);
    }

    function calcFrontHealth(front) {
      let total = 0, count = 0;
      const statusScore = {
        'держится':8, 'сохранён':8, 'нейтрально':7,
        'угасла':4, 'пауза':4, 'хрупкое':3, 'критично':1, 'нет':1
      };
      front.параметры.forEach(p => {
        if (p.уровень !== undefined) { total += p.уровень; count++; }
        else if (p.имя === 'Сон') { total += statusScore[p.статус] || 5; count++; }
        else if (p.имя === 'Питание') { total += statusScore[p.статус] || 5; count++; }
        else if (p.имя === 'Баланс') { total += statusScore[p.статус] || 5; count++; }
        else if (p.имя === 'Цель') { total += 5; count++; }
        else if (p.имя === 'Доход за месяц') { total += statusScore[p.статус] || 5; count++; }
        else if (p.имя === 'Несданных долгов') { total += statusScore[p.статус] || 5; count++; }
        else { total += statusScore[p.статус] || 5; count++; }
      });
      return { score: total, max: count * 10 };
    }

    function calcSleepDuration(bed, wake) {
      if (!bed || !wake) return '';
      const [bh, bm] = bed.split(':').map(Number);
      const [wh, wm] = wake.split(':').map(Number);
      let bedMins = bh * 60 + bm;
      let wakeMins = wh * 60 + wm;
      if (wakeMins <= bedMins) wakeMins += 24 * 60;
      const h = Math.floor((wakeMins - bedMins) / 60);
      const m = (wakeMins - bedMins) % 60;
      return `${h}ч ${m}м`;
    }

    function updateCoreRing(scores) {
      const avg = scores.reduce((a,b) => a + b, 0) / scores.length;
      const pct = Math.round(avg * 100);
      document.getElementById('corePercent').textContent = pct + '%';
      const circle = document.getElementById('coreRing');
      const circumference = 2 * Math.PI * 34;
      circle.style.strokeDashoffset = circumference - (avg * circumference);
      circle.style.stroke = avg < 0.4 ? '#ff5e5e' : avg < 0.7 ? '#f0c060' : '#9b59b6';
    }

    // ========== Сохранение с историей ==========
    function saveAll() {
      syncAllAutoStatuses();
      // добавляем снимок в историю
      const snapshot = {
        дата: new Date().toISOString().slice(0,10),
        индекс: calcOverallIndex(),
        фронты: currentData.фронты.map(f => ({
          название: f.название,
          здоровье: calcFrontHealth(f).score / calcFrontHealth(f).max
        }))
      };
      if (!currentData.история) currentData.история = [];
      // не дублируем ту же дату
      const last = currentData.история[currentData.история.length - 1];
      if (!last || last.дата !== snapshot.дата) {
        currentData.история.push(snapshot);
      }
      localStorage.setItem('obsidian_hybrid', JSON.stringify(currentData));
      updateJsonPreview();
      alert('✅ Сохранено. История обновлена.');
    }

    function calcOverallIndex() {
      let sum = 0;
      currentData.фронты.forEach(f => {
        const { score, max } = calcFrontHealth(f);
        sum += score / max;
      });
      return sum / currentData.фронты.length;
    }

    function updateJsonPreview() {
      document.getElementById('jsonPreview').textContent = JSON.stringify(currentData, null, 2);
    }

    // ========== Графики ==========
    function renderCharts() {
      const history = currentData.история || [];
      if (history.length === 0) {
        alert('Нет истории. Сохраните данные хотя бы раз на вкладке Дашборд.');
        return;
      }
      const labels = history.map(h => h.дата);
      const indexData = history.map(h => Math.round(h.индекс * 100));
      const ctx1 = document.getElementById('indexChart').getContext('2d');
      if (indexChartInstance) indexChartInstance.destroy();
      indexChartInstance = new Chart(ctx1, {
        type: 'line',
        data: {
          labels: labels,
          datasets: [{
            label: 'Obsidian Core Index (%)',
            data: indexData,
            borderColor: '#9b59b6',
            backgroundColor: 'rgba(155, 89, 182, 0.1)',
            fill: true,
            tension: 0.3
          }]
        },
        options: {
          responsive: true,
          scales: { y: { min: 0, max: 100, ticks: { color: '#ccc' } }, x: { ticks: { color: '#ccc' } } },
          plugins: { legend: { labels: { color: '#ccc' } } }
        }
      });

      // График здоровья фронтов
      const ctx2 = document.getElementById('frontsChart').getContext('2d');
      if (frontsChartInstance) frontsChartInstance.destroy();
      const frontNames = currentData.фронты.map(f => f.название);
      const colors = ['#ff5e5e','#6ee7b7','#f0c060','#f0a060','#a0c4ff','#9b59b6'];
      const datasets = frontNames.map((name, idx) => {
        return {
          label: name,
          data: history.map(h => {
            const f = h.фронты.find(fr => fr.название === name);
            return f ? Math.round(f.здоровье * 100) : 0;
          }),
          borderColor: colors[idx % colors.length],
          backgroundColor: 'transparent',
          tension: 0.3
        };
      });
      frontsChartInstance = new Chart(ctx2, {
        type: 'line',
        data: { labels, datasets },
        options: {
          responsive: true,
          scales: { y: { min: 0, max: 100, ticks: { color: '#ccc' } }, x: { ticks: { color: '#ccc' } } },
          plugins: { legend: { labels: { color: '#ccc' } } }
        }
      });
    }

    function clearHistory() {
      if (confirm('Удалить всю историю графиков?')) {
        currentData.история = [];
        localStorage.setItem('obsidian_hybrid', JSON.stringify(currentData));
        if (indexChartInstance) indexChartInstance.destroy();
        if (frontsChartInstance) frontsChartInstance.destroy();
        alert('История очищена.');
      }
    }

    // ========== Остальное ==========
    function toggleJson() {
      const prev = document.getElementById('jsonPreview');
      if (prev.style.display === 'block') prev.style.display = 'none';
      else { updateJsonPreview(); prev.style.display = 'block'; }
    }
    function resetToJson() {
      if (confirm('Сбросить до версии из data.json? Все локальные данные будут потеряны.')) {
        localStorage.removeItem('obsidian_hybrid');
        location.reload();
      }
    }
    function updateGlobal(key, value) { currentData[key] = value; }
    function toggleGoal(i) { let g = currentData.цели[i]; currentData.цели[i] = g.startsWith('✓') ? g.substring(1) : '✓' + g; }
    function updateGoal(i, text) { const checked = currentData.цели[i].startsWith('✓'); currentData.цели[i] = checked ? '✓' + text : text; }
    function addGoal() { currentData.цели.push(''); renderAll(); }
    function escapeHtml(t) { return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    // (все пропущенные обработчики – updateSleep, updateNutrition, updateBalance и т.д. – идентичны предыдущей полной версии;
