<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Obsidian Core | Дашборд</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #0b0c1a 0%, #1a1c3b 50%, #2d1b3a 100%);
      color: #e0e0e0;
      line-height: 1.5;
      padding: 30px 20px;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }
    .bg-text {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: clamp(3rem, 12vw, 10rem);
      font-weight: 900;
      color: rgba(255,255,255,0.03);
      white-space: nowrap;
      pointer-events: none;
      z-index: 0;
      letter-spacing: 0.05em;
      user-select: none;
    }
    .container { max-width: 750px; margin: 0 auto; position: relative; z-index: 1; }
    h1 {
      font-size: 2.2rem; font-weight: 600; margin-bottom: 5px;
      color: #f0f0f0; text-shadow: 0 2px 10px rgba(0,0,0,0.5);
    }
    .subtitle {
      color: #8b8fa3; margin-bottom: 30px; font-size: 0.95rem;
      display: flex; align-items: center; gap: 6px;
    }
    .blinking-dot {
      display: inline-block; width: 8px; height: 8px;
      background: #6ee7b7; border-radius: 50%; margin-left: 4px;
      animation: blink 1.5s ease-in-out infinite;
      box-shadow: 0 0 8px #6ee7b7;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; } 50% { opacity: 0.2; }
    }
    .card {
      background: rgba(20, 25, 35, 0.6);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border-radius: 16px; padding: 24px; margin-bottom: 20px;
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
      transition: transform 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
      opacity: 0; animation: fadeInCard 0.5s ease forwards;
    }
    @keyframes fadeInCard { to { opacity: 1; } }
    .card:hover {
      transform: translateY(-4px);
      border-color: rgba(255,255,255,0.18);
      box-shadow: 0 12px 28px rgba(0,0,0,0.5);
    }
    h2 {
      font-size: 1.2rem; font-weight: 600; margin-bottom: 18px;
      color: #c0c4d0; letter-spacing: 0.02em;
    }
    .field {
      display: flex; align-items: center; flex-wrap: wrap; gap: 10px;
      margin-bottom: 18px; padding-bottom: 14px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .field:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
    .field label {
      width: 130px; font-size: 0.9rem; color: #aaa;
      display: flex; align-items: center; gap: 6px;
    }
    .status-dot {
      width: 10px; height: 10px; border-radius: 50%;
      display: inline-block; box-shadow: 0 0 8px currentColor;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .status-критично, .status-нет { background: #ff5e5e; color: #ff5e5e; }
    .status-держится, .status-сохранён { background: #6ee7b7; color: #6ee7b7; }
    .status-угасла, .status-пауза { background: #f0c060; color: #f0c060; }
    .status-хрупкое { background: #f0a060; color: #f0a060; }
    .status-нейтрально { background: #a0c4ff; color: #a0c4ff; }
    .field input, .field select, .field textarea {
      flex: 1; padding: 8px; border: none; border-radius: 6px;
      background: rgba(255,255,255,0.08); color: #fff;
      font-size: 0.9rem; font-family: inherit;
      transition: background 0.2s;
    }
    .field input:focus, .field select:focus, .field textarea:focus {
      background: rgba(255,255,255,0.15); outline: none;
    }
    .field textarea { resize: vertical; min-height: 50px; }
    .checklist { list-style: none; padding-left: 0; }
    .checklist li { margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
    .checklist input[type="checkbox"] { width: 18px; height: 18px; accent-color: #666; }
    .buttons {
      display: flex; gap: 12px; margin-top: 20px;
    }
    .btn {
      padding: 10px 24px; border: none; border-radius: 8px;
      font-size: 1rem; font-weight: 500; cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      background: rgba(255,255,255,0.1); color: #fff;
      backdrop-filter: blur(5px);
    }
    .btn:hover { background: rgba(255,255,255,0.2); transform: translateY(-1px); }
    .btn.primary { background: #4a7c6b; color: white; }
    .btn.primary:hover { background: #5f9a84; }
    .json-preview {
      background: rgba(0,0,0,0.3); border-radius: 8px; padding: 15px;
      margin-top: 15px; font-family: monospace; font-size: 0.8rem;
      white-space: pre-wrap; word-break: break-word;
      max-height: 200px; overflow-y: auto; display: none;
      border: 1px solid rgba(255,255,255,0.1);
    }
    @media (max-width: 600px) {
      .field { flex-direction: column; align-items: flex-start; }
      .field label { width: auto; margin-bottom: 4px; }
      .buttons { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="bg-text">Obsidian Core System 2</div>
  <div class="container">
    <h1>⚡ Obsidian Core v2.0</h1>
    <p class="subtitle">
      Редактор состояния на <span id="currentDate"></span>
      <span class="blinking-dot"></span>
    </p>

    <!-- Верхняя панель -->
    <div class="card" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;">
      <div style="display: flex; align-items: center; gap: 10px;">
        <span>ЦНС (1–10):</span>
        <input type="number" id="cnsValue" min="1" max="10" value="5" style="width: 60px;">
        <span id="cnsIndicator" class="status-dot status-хрупкое"></span>
      </div>
      <div class="buttons" style="margin-top: 0;">
        <button class="btn primary" onclick="saveAll()">💾 Сохранить всё</button>
        <button class="btn" onclick="toggleJson()">📋 Показать JSON</button>
        <button class="btn" onclick="resetToJson()">🔄 Сбросить из JSON</button>
      </div>
    </div>

    <!-- Динамические карточки фронтов будут вставлены здесь -->
    <div id="frontsContainer"></div>

    <!-- Блок JSON для копирования -->
    <div id="jsonPreview" class="json-preview"></div>
  </div>

  <script>
    let currentData = null; // тут будет актуальный объект данных

    // ========== Инициализация ==========
    window.onload = async () => {
      displayDate();
      // пробуем загрузить из localStorage
      const saved = localStorage.getItem('obsidian_hybrid');
      if (saved) {
        try {
          currentData = JSON.parse(saved);
          console.log('Загружены данные из localStorage');
        } catch (e) {}
      }
      // если нет — тянем data.json
      if (!currentData) {
        try {
          const res = await fetch('data.json');
          if (res.ok) {
            currentData = await res.json();
            console.log('Данные загружены из data.json');
          }
        } catch (e) {
          console.warn('data.json не найден или повреждён, создаём пустую структуру');
        }
      }
      // если и так нет — создаём заготовку
      if (!currentData) {
        currentData = getEmptyStructure();
      }
      renderFronts(currentData);
      updateCnsIndicator();
    };

    function displayDate() {
      const now = new Date();
      document.getElementById('currentDate').textContent = now.toLocaleDateString('ru-RU', {
        weekday: 'short', year: 'numeric', month: 'long', day: 'numeric'
      });
    }

    function getEmptyStructure() {
      return {
        дата: new Date().toISOString().slice(0, 10),
        фронты: [
          {
            название: "0.4 — ЦНС и тело",
            параметры: [
              { имя: "Сон", состояние: "Не заполнено", статус: "критично", значение: "" },
              { имя: "Питание", состояние: "Не заполнено", статус: "угасла", значение: "" },
              { имя: "Физнагрузка", состояние: "Не заполнено", статус: "угасла", значение: "" },
              { имя: "Общее ЦНС", состояние: "Не заполнено", статус: "хрупкое", уровень: 4.5 }
            ]
          },
          {
            название: "1 — Магазин / Студия",
            параметры: [
              { имя: "Магазин «СКИФ»", состояние: "Не заполнено", статус: "критично", значение: "" },
              { имя: "Студия автосвета", состояние: "Не заполнено", статус: "угасла", значение: "" }
            ]
          },
          {
            название: "0.1 — Капитал",
            параметры: [
              { имя: "Сумма", состояние: "Не заполнено", статус: "держится", значение: "" },
              { имя: "Доход", состояние: "Не заполнено", статус: "критично", значение: "" }
            ]
          },
          {
            название: "Наблюдение",
            параметры: [
              { имя: "Школа", состояние: "Не заполнено", статус: "нейтрально", значение: "" },
              { имя: "Соц. среда", состояние: "Не заполнено", статус: "нейтрально", значение: "" }
            ]
          }
        ],
        протоколы: "",
        цели: [""]
      };
    }

    // ========== Рендер карточек ==========
    function renderFronts(data) {
      const container = document.getElementById('frontsContainer');
      if (!container) return;
      let html = '';

      data.фронты.forEach((фронт, fi) => {
        html += `<div class="card" style="animation-delay: ${fi * 0.1}s">`;
        html += `<h2>${фронт.название}</h2>`;

        фронт.параметры.forEach((param, pi) => {
          const statusClass = `status-${param.статус || 'нейтрально'}`;
          html += `<div class="field">`;
          html += `<label><span class="status-dot ${statusClass}"></span>${param.имя}</label>`;

          // Для каждого типа поля — свой инпут
          if (param.уровень !== undefined) {
            // число + прогресс-бар
            html += `<input type="number" min="0" max="10" step="0.1" value="${param.уровень}" 
                      onchange="updateParam(${fi}, ${pi}, 'уровень', this.value)" style="width:80px;">`;
          } else {
            // текстовое состояние
            html += `<input type="text" value="${escapeHtml(param.состояние || '')}" 
                      onchange="updateParam(${fi}, ${pi}, 'состояние', this.value)" placeholder="Описание">`;
          }

          // селект статуса
          html += `<select onchange="updateParam(${fi}, ${pi}, 'статус', this.value)" style="width:120px;">`;
          ['критично','держится','угасла','хрупкое','нейтрально','сохранён','пауза','нет'].forEach(st => {
            html += `<option value="${st}" ${param.статус === st ? 'selected' : ''}>${st}</option>`;
          });
          html += `</select>`;

          // если есть уровень — покажем маленький прогресс-бар
          if (param.уровень !== undefined) {
            const percent = (param.уровень / 10) * 100;
            html += `<div style="width:100%; background:rgba(255,255,255,0.1); height:4px; border-radius:2px; margin-top:4px;">
                       <div style="width:${percent}%; height:100%; background:linear-gradient(90deg, #f0a060, #e07050); border-radius:2px;"></div>
                     </div>`;
          }
          html += `</div>`;
        });
        html += `</div>`;
      });

      // Протоколы и цели
      html += `<div class="card" style="animation-delay: ${data.фронты.length * 0.1}s">`;
      html += `<h2>📋 Протоколы</h2>`;
      html += `<div class="field"><textarea onchange="updateGlobal('протоколы', this.value)" placeholder="Текущие протоколы">${escapeHtml(data.протоколы || '')}</textarea></div>`;
      html += `</div>`;

      html += `<div class="card" style="animation-delay: ${data.фронты.length * 0.1 + 0.1}s">`;
      html += `<h2>🎯 Ближайшие цели</h2>`;
      html += `<ul class="checklist" id="goalsList">`;
      (data.цели || []).forEach((цель, i) => {
        html += `<li><input type="checkbox" ${цель.startsWith('✓') ? 'checked' : ''} onchange="toggleGoal(${i})"> 
                 <input type="text" value="${escapeHtml(цель.replace('✓',''))}" onchange="updateGoal(${i}, this.value)" style="flex:1;"></li>`;
      });
      html += `<li><button class="btn" onclick="addGoal()">+ Добавить цель</button></li>`;
      html += `</ul></div>`;

      container.innerHTML = html;
    }

    // ========== Обработчики изменений ==========
    function updateParam(fi, pi, key, value) {
      if (key === 'уровень') value = parseFloat(value);
      currentData.фронты[fi].параметры[pi][key] = value;
      // если изменили статус — можно перерисовать точку (но мы не перерендериваем всё, чтобы не сбить фокус; можно обновить класс точки)
      const field = document.querySelectorAll('.field');
      // упрощённо: обновляем класс у первой точки в строке?
      // мы не будем перерисовывать ради сохранения ввода, просто запомним.
      // для отражения изменений в интерфейсе статусов перерисуем только при необходимости.
      // оставим так: данные сохраняются, при нажатии "сохранить" они фиксируются.
    }
    function updateGlobal(key, value) {
      currentData[key] = value;
    }
    function toggleGoal(i) {
      let goal = currentData.цели[i];
      if (goal.startsWith('✓')) currentData.цели[i] = goal.substring(1);
      else currentData.цели[i] = '✓' + goal;
    }
    function updateGoal(i, newText) {
      const wasChecked = currentData.цели[i].startsWith('✓');
      currentData.цели[i] = wasChecked ? '✓' + newText : newText;
    }
    function addGoal() {
      if (!currentData.цели) currentData.цели = [];
      currentData.цели.push('');
      renderFronts(currentData); // перерисовываем, чтобы появился новый инпут
    }

    // ========== Сохранение ==========
    function saveAll() {
      // синхронизируем значение ЦНС из верхней панели
      const cnsVal = parseFloat(document.getElementById('cnsValue').value);
      // найдём параметр "Общее ЦНС" в первом фронте
      const cnsParam = currentData.фронты[0].параметры.find(p => p.имя === 'Общее ЦНС');
      if (cnsParam) cnsParam.уровень = cnsVal;

      localStorage.setItem('obsidian_hybrid', JSON.stringify(currentData));
      updateJsonPreview();
      alert('✅ Данные сохранены локально. Чтобы обновить облачную версию, скопируйте JSON из окна ниже и замените содержимое data.json на GitHub.');
      updateCnsIndicator();
    }

    function updateJsonPreview() {
      const preview = document.getElementById('jsonPreview');
      preview.textContent = JSON.stringify(currentData, null, 2);
    }
    function toggleJson() {
      const preview = document.getElementById('jsonPreview');
      if (preview.style.display === 'block') {
        preview.style.display = 'none';
      } else {
        updateJsonPreview();
        preview.style.display = 'block';
      }
    }

    function resetToJson() {
      if (confirm('Сбросить все изменения до последней версии из data.json? Локальные правки будут потеряны.')) {
        localStorage.removeItem('obsidian_hybrid');
        location.reload();
      }
    }

    function updateCnsIndicator() {
      const val = parseFloat(document.getElementById('cnsValue').value) || 5;
      const ind = document.getElementById('cnsIndicator');
      ind.className = 'status-dot ';
      if (val <= 3) ind.classList.add('status-критично');
      else if (val <= 6) ind.classList.add('status-хрупкое');
      else ind.classList.add('status-держится');
    }

    function escapeHtml(text) {
      if (!text) return '';
      return String(text)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // слушатель ЦНС
    document.addEventListener('DOMContentLoaded', () => {
      const cnsInput = document.getElementById('cnsValue');
      if (cnsInput) {
        cnsInput.addEventListener('input', updateCnsIndicator);
      }
    });
  </script>
</body>
</html>
